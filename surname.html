<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="surname.css">
</head>
<body>
    <h1>Mr. Surname Blender</h1>
<div>
<span>Surname:</span>
<input id="surname" type="text" size="20" />
</div>
<div>
<span>Font:</span>
<select id="font">
<option>Arial</option>
<option>Comic Sans MS</option>
<option>Times New Roman</option>
</select>
</div>
<div>
<span>Position:</span>
<input id="sequential" surname="pos" type="radio" value="seq" checked="checked"
/>Sequential
<input id="random" surname="pos" type="radio" value="rand" /> Random
<input id="reverse" surname="pos" type="radio" value="rev" /> Reverse

<div>
    <label> colour:</label>
    <select  id="Colour">
       <option value="black">Black</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
    </select>
</div>
<div>
    <label>Font Size:</label>
    <input id="size" type="number" value="16" placeholder="font size">
</div>

<div id="output" style="position: relative; width: 400px; height: 200px; border: 1px solid black;">

</div>
<button id="blend-btn">Blend Now</button>


</div> <div>

    
    <script src="surname.js"></script>
</body>
</html>
